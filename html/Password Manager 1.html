<!DOCTYPE html>
<html>
<head>
    <title>Password Manager</title>
</head>
<body>
    <h1>Password Manager</h1>

    <label for="website">Website:</label>
    <input type="text" id="website" required>
    <br>
    <label for="username">Username:</label>
    <input type="text" id="username" required>
    <br>
    <label for="password">Password:</label>
    <input type="password" id="password" required>
    <br>
    <button onclick="savePassword()">Save Password</button>
    <br>
    <button onclick="displayPasswords()">Display Passwords</button>

    <script>
        function savePassword() {
            var website = document.getElementById("website").value;
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Retrieve existing passwords from local storage
            var passwords = JSON.parse(localStorage.getItem("passwords")) || [];

            // Create a new password object
            var newPassword = {
                website: website,
                username: username,
                password: password
            };

            // Add the new password to the list
            passwords.push(newPassword);

            // Save the updated passwords to local storage
            localStorage.setItem("passwords", JSON.stringify(passwords));

            // Clear input fields
            document.getElementById("website").value = "";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";

            alert("Password saved successfully!");
        }

        function displayPasswords() {
            var passwords = JSON.parse(localStorage.getItem("passwords"));

            if (!passwords || passwords.length === 0) {
                alert("No passwords saved.");
                return;
            }

            var passwordList = "Saved Passwords:\n\n";
            for (var i = 0; i < passwords.length; i++) {
                var password = passwords[i];
                passwordList += "Website: " + password.website + "\n";
                passwordList += "Username: " + password.username + "\n";
                passwordList += "Password: " + password.password + "\n";
                passwordList += "\n";
            }

            alert(passwordList);
        }
    </script>
</body>
</html>
