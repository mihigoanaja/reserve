<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to WhatsApp Formatter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            margin-top: 20px;
        }
        .output {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .buttons-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Markdown to WhatsApp Message Formatter</h1>
        <textarea id="markdownInput" placeholder="Enter your Markdown text here..."></textarea>
        <button onclick="convertMarkdown()">Convert</button>
        <div class="buttons-container">
            <button onclick="copyToClipboard()">Copy to Clipboard</button>
        </div>
        <h2>WhatsApp Message Format:</h2>
        <div id="whatsappOutput" class="output"></div>
    </div>
    <script>
        function convertMarkdown() {
            const markdownText = document.getElementById('markdownInput').value;
            const whatsappText = markdownToWhatsApp(markdownText);
            document.getElementById('whatsappOutput').textContent = whatsappText;
        }

        function markdownToWhatsApp(text) {
            // Convert Markdown to WhatsApp message format
            return text
                .replace(/#### (.+)/g, '*$1*')  // Convert #### header to bold
                .replace(/### (.+)/g, '*$1*')  // Convert ### header to bold
                .replace(/## (.+)/g, '*$1*')   // Convert ## header to bold
                .replace(/# (.+)/g, '*$1*')    // Convert # header to bold
                .replace(/\*\*(.+?)\*\*/g, '*$1*')  // Convert **text** to *text* for bold
                .replace(/\*(.+?)\*/g, '*$1*') // Convert *text* to *text* for italic
                .replace(/_(.+?)_/g, '_$1_')   // Convert _text_ to _text_ for italic
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)')  // Convert [link](url) to link format
                .replace(/`([^`]+)`/g, '`$1`');  // Convert `code` to `code`
        }

        function copyToClipboard() {
            const outputText = document.getElementById('whatsappOutput').textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(outputText).then(() => {
                    alert('Copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                });
            } else {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = outputText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('Copied to clipboard!');
                } catch (err) {
                    console.error('Failed to copy text: ', err);
                }
                document.body.removeChild(textArea);
            }
        }
    </script>
</body>
</html>
