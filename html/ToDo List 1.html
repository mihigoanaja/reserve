<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Todo List</title>
	<style>
		body {
			font-family: Arial, sans-serif;
		}
		h1 {
			text-align: center;
		}
		.todo-form {
			display: flex;
			margin-bottom: 20px;
		}
		.todo-form input[type="text"] {
			flex-grow: 1;
			padding: 10px;
			font-size: 16px;
			border: none;
			border-radius: 4px 0 0 4px;
			box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
			outline: none;
		}
		.todo-form button {
			padding: 10px 20px;
			font-size: 16px;
			background-color: #007bff;
			color: #fff;
			border: none;
			border-radius: 0 4px 4px 0;
			box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
			cursor: pointer;
		}
		.todo-list {
			list-style: none;
			padding: 0;
			margin: 0;
			max-width: 600px;
			margin: 0 auto;
		}
		.todo-item {
			display: flex;
			align-items: center;
			padding: 10px;
			border-bottom: 1px solid #ccc;
		}
		.todo-item .todo-text {
			flex-grow: 1;
			margin-left: 10px;
		}
		.todo-item .todo-delete {
			margin-left: 10px;
			background-color: #dc3545;
			color: #fff;
			border: none;
			border-radius: 4px;
			padding: 5px 10px;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<h1>Todo List</h1>
	<div class="todo-form">
		<input type="text" id="todo-input" placeholder="Add a new todo...">
		<button id="add-todo">Add</button>
	</div>
	<ul class="todo-list" id="todo-list">
		<!-- todo items will be added dynamically here -->
	</ul>
	<script>
		// get existing todos from local storage
		let todos = JSON.parse(localStorage.getItem('todos')) || [];

		// render existing todos
		renderTodos();

		// add event listener to add todo button
		document.getElementById('add-todo').addEventListener('click', function() {
			let todoInput = document.getElementById('todo-input');
			let todoText = todoInput.value.trim();
			if (todoText.length > 0) {
				// add new todo to array and save to local storage
				todos.push({ text: todoText, done: false });
				localStorage.setItem('todos', JSON.stringify(todos));
				// clear input and render todos
				todoInput.value = '';
				renderTodos();
			}
		});

		// add event listener to delete todo button
		document.getElementById('todo-list').addEventListener('click', function(event) {
			if (event.target.classList.contains('todo-delete')) {
				let todoIndex = parseInt(event.target.getAttribute('data-index'));
				// remove todo from array and save to local storage
				todos.splice(todoIndex, 1);
localStorage.setItem('todos', JSON.stringify(todos));
// render todos
renderTodos();
}
});
	function renderTodos() {
		let todoList = document.getElementById('todo-list');
		todoList.innerHTML = '';
		for (let i = 0; i < todos.length; i++) {
			let todo = todos[i];
			let todoItem = document.createElement('li');
			todoItem.classList.add('todo-item');
			let todoCheckbox = document.createElement('input');
			todoCheckbox.setAttribute('type', 'checkbox');
			todoCheckbox.checked = todo.done;
			todoCheckbox.addEventListener('click', function() {
				// update todo and save to local storage
				todo.done = todoCheckbox.checked;
				localStorage.setItem('todos', JSON.stringify(todos));
			});
			let todoText = document.createElement('span');
			todoText.classList.add('todo-text');
			todoText.innerText = todo.text;
			let todoDelete = document.createElement('button');
			todoDelete.classList.add('todo-delete');
			todoDelete.setAttribute('data-index', i);
			todoDelete.innerText = 'Delete';
			todoItem.appendChild(todoCheckbox);
			todoItem.appendChild(todoText);
			todoItem.appendChild(todoDelete);
			todoList.appendChild(todoItem);
		}
	}
</script>
</body>
</html>
