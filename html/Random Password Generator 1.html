<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        #passwordForm {
            max-width: 400px;
            margin-bottom: 20px;
        }

        #generatedPassword {
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Password Generator</h1>

    <form id="passwordForm">
        <label for="passwordLength">Password Length:</label>
        <input type="number" id="passwordLength" min="4" max="20" value="8" required>

        <label for="includeUppercase">Include Uppercase Letters:</label>
        <input type="checkbox" id="includeUppercase">

        <label for="includeNumbers">Include Numbers:</label>
        <input type="checkbox" id="includeNumbers">

        <label for="includeSymbols">Include Symbols:</label>
        <input type="checkbox" id="includeSymbols">

        <button type="button" onclick="generatePassword()">Generate Password</button>
    </form>

    <div id="generatedPassword"></div>

    <script>
        function generatePassword() {
            const length = document.getElementById("passwordLength").value;
            const includeUppercase = document.getElementById("includeUppercase").checked;
            const includeNumbers = document.getElementById("includeNumbers").checked;
            const includeSymbols = document.getElementById("includeSymbols").checked;

            const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
            const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numberChars = "0123456789";
            const symbolChars = "!@#$%^&*()_-+=";

            let allChars = lowercaseChars;
            if (includeUppercase) allChars += uppercaseChars;
            if (includeNumbers) allChars += numberChars;
            if (includeSymbols) allChars += symbolChars;

            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * allChars.length);
                password += allChars.charAt(randomIndex);
            }

            document.getElementById("generatedPassword").textContent = `Generated Password: ${password}`;
        }
    </script>

</body>
</html>
